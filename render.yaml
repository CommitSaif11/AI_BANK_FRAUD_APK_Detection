services:
  - type: web
    name: apk-analyzer-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    envVars:
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: apk-analyzer-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://apk-analyzer-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
